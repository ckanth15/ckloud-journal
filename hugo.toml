baseURL = "https://ckanth15.github.io/ckloud-journal/"
languageCode = "en-us"
title = "Chandra's Ckloud Journal"
theme = "PaperMod"
paginate = 10

[params]
  description = "Cloud computing projects, troubleshooting, and lessons learned"
  author = "Chandra Kanth"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"

  [params.homeInfoParams]
    Title = "Hey there!"
    Content = "Cloud engineer sharing hands-on projects, debugging war stories, and certification prep notes. Currently working with Azure and AWS."

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/chandrakanthsingh/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ckanth15"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
